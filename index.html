<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slack Key Guitarist Search</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Slack Key Tunings</h1>

      <section class="file-loader">
        <label class="field">
          <span>Load songs.html</span>
          <input id="sourceFile" type="file" accept=".html,.htm,text/html" />
        </label>
      </section>

      <section class="filters">
        <label class="field">
          <span>Tuning</span>
          <select id="tuningFilter" disabled>
            <option value="">All Tunings</option>
          </select>
        </label>
        <label class="field">
          <span>Search (Guitarist/Song)</span>
          <input id="searchQuery" type="text" placeholder="Type here..." disabled />
        </label>
        <button id="clearBtn" type="button" disabled>Clear</button>
      </section>

      <p id="statusMessage" class="result-count">Loading...</p>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Guitarist</th>
              <th>Song Title</th>
              <th>Tuning</th>
              <th>Album</th>
              <th>Remark</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </section>
    </main>
    <iframe id="songsSource" src="songs.html" title="songs source" hidden></iframe>
    <script src="app.js"></script>
  </body>
</html>
